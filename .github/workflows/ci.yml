name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI_TEST || 'mongodb://localhost:27017/ish_test' }}
          JWT_ACCESS_SECRET: test-access-secret-64-chars-long-padding-padding-padding-pad
          JWT_REFRESH_SECRET: test-refresh-secret-64-chars-long-padding-padding-padding-pa
          JWT_EMAIL_VERIFY_SECRET: test-email-secret-64-chars-long-padding-padding-padding-pad

  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SOCKET_URL: http://localhost:3000

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ish-backend ./Backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:3000 \
            --build-arg VITE_SOCKET_URL=http://localhost:3000 \
            -t ish-frontend ./Frontend
