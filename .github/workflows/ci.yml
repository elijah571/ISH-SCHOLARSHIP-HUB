name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ish-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ish-frontend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. BACKEND — test against a real PostgreSQL database
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ish_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ish_test
          JWT_ACCESS_SECRET: test-access-secret-64-chars-long-padding-padding-padding-pad
          JWT_REFRESH_SECRET: test-refresh-secret-64-chars-long-padding-padding-padding-pa
          JWT_EMAIL_VERIFY_SECRET: test-email-secret-64-chars-long-padding-padding-padding-pad

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ish_test
          JWT_ACCESS_SECRET: test-access-secret-64-chars-long-padding-padding-padding-pad
          JWT_REFRESH_SECRET: test-refresh-secret-64-chars-long-padding-padding-padding-pa
          JWT_EMAIL_VERIFY_SECRET: test-email-secret-64-chars-long-padding-padding-padding-pad

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. FRONTEND — lint + build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SOCKET_URL: http://localhost:3000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. DOCKER — build & push images to GHCR (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:3000' }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. DEPLOY — SSH into server, pull new images, run migrations, restart
  #    Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
  #    Set DEPLOY_ENABLED=true in GitHub repo vars to activate
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '~/ish-scholarship-hub' }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose pull backend frontend

            # Run DB migrations before swapping containers
            docker compose run --rm backend node src/database/migrate.js

            # Rolling restart
            docker compose up -d --no-deps backend frontend

            # Clean up old images
            docker image prune -f
